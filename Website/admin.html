<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAB Journal Admin</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .admin-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #151921, var(--clr-bg));
        }
        
        .admin-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
        }

        .dashboard-glass {
            max-width: 1200px;
            padding: 2rem;
        }

        .dashboard-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }

        @media (max-width: 800px) {
            .dashboard-split {
                grid-template-columns: 1fr;
            }
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--clr-text-muted);
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .post-list {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
        }

        .post-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .post-list-item:hover { background: rgba(255, 255, 255, 0.02); }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="sterile-theme">
    <div class="grain-overlay"></div>

    <div class="admin-wrapper" id="login-view">
        <div class="admin-glass">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="margin-bottom:0.5rem;">Access Journal Control</h2>
                <p style="color: var(--clr-text-muted); font-family: var(--font-mono); font-size: 0.8rem;">Initialize authorization proxy</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Designation</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Passcode</label>
                    <input type="password" id="login-password" required>
                </div>
                <p id="login-error" style="color: #ef4444; font-size:0.8rem; margin-bottom: 1rem; display: none;"></p>
                <button type="submit" class="btn-primary" id="login-btn">Authenticate</button>
            </form>
            <div style="margin-top: 2rem; text-align: center;">
                <a href="index.html" class="btn-text">&larr; Return to Portfolio</a>
            </div>
        </div>
    </div>

    <div class="admin-wrapper" id="dashboard-view" style="display: none;">
        <div class="admin-glass dashboard-glass">
            <div class="top-bar">
                <h2>Journal Command Center</h2>
                <div>
                     <a href="index.html" class="btn-text" style="margin-right: 1.5rem;">&larr; View Live Site</a>
                    <button id="logout-btn" class="btn-outline" style="margin-top: 0; padding: 0.5rem 1.5rem;">Initialize Sleep</button>
                </div>
            </div>

            <div class="dashboard-split">
                <!-- Create Form -->
                <div>
                    <h3 style="margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 1rem; color: var(--clr-accent);">[ Create Transmit ]</h3>
                    <form id="create-post-form">
                        <div class="form-group">
                            <label class="form-label">Title</label>
                            <input type="text" id="post-title" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category / Tag</label>
                            <input type="text" id="post-category" placeholder="e.g. Opinion, Fiction" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Image URL (Optional)</label>
                            <input type="text" id="post-image" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Content / Excerpt</label>
                            <textarea id="post-content" rows="6" required></textarea>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Date</label>
                            <input type="date" id="post-date" required>
                        </div>
                        <button type="submit" class="btn-primary" id="create-btn">Inject to Archive</button>
                    </form>
                </div>

                <!-- Manage List -->
                </div>
            </div>

            <!-- Moderation Section -->
            <div style="margin-top: 4rem; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 3rem;">
                <h3 style="margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 1rem; color: #fbbf24;">[ Pending Reflections ]</h3>
                <p style="color: var(--clr-text-muted); font-size: 0.8rem; margin-bottom: 2rem; font-family: var(--font-mono);">Awaiting moderation for the Archive collection.</p>
                <div class="post-list" id="admin-submission-list">
                    <div style="text-align: center; color: var(--clr-text-muted); padding: 2rem;">Initializing moderation queue...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
