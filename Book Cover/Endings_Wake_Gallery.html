        :root {
            --bg-dark: #070B14;
            --bg-panel: #111A2C;
            --bg-active: #1D2A43;

            --accent-gold: #E2B961;
            --text-main: #E2E8F0;

        }

        * {

            padding: 0;
            box-sizing: border-box;
        }

            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3, h4 { font-weight: 600; letter-spacing: -0.02em; }
        
        /* Layout */
        #sidebar {
            width: 380px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: 4px 0 24px rgba(0,0,0,0.4);
        }

        #sidebar-header {
            padding: 32px 24px 24px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(29, 42, 67, 0.4) 0%, rgba(17, 26, 44, 0) 100%);
        }

        #sidebar-header h1 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        #sidebar-header p {
            font-size: 13px;
            color: var(--accent-gold);
            font-style: italic;
        }

        #nav-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        /* Navigation Items */
        .act-group {
            margin-bottom: 24px;
        }

        .act-title {
            padding: 8px 24px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .nav-item {
            padding: 12px 24px 12px 36px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            font-size: 14px;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: var(--accent-blue);
            transform: scaleY(0);
            transition: transform 0.3s ease;
            transform-origin: center;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: #fff;
            padding-left: 40px;
        }

        .nav-item.active {
            background-color: var(--bg-active);
            color: #fff;
            font-weight: 500;
        }
        
        .nav-item.active::before {
            transform: scaleY(1);
        }
        
        .nav-num {
            color: var(--text-muted);
            margin-right: 12px;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }
        
        .nav-item.active .nav-num {
            color: var(--accent-gold);
        }

        /* Main Content */
        #main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at center, #111a2d 0%, #070b14 100%);
        }

        .gallery-view {
            max-width: 1200px;
            margin: 0 auto;
            padding: 64px 48px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .gallery-view.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Image Display */
        .image-container {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
            margin-bottom: 40px;
            position: relative;
        }
        
        .image-placeholder {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }

        /* Brief Text Display */
        .brief-container {
            background: rgba(17, 26, 44, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--glow);
        }

        .brief-header {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .brief-meta {
            color: var(--accent-gold);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .brief-title {
            font-size: 28px;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .brief-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }
        
        @media (min-width: 1100px) {
            .brief-grid {
                grid-template-columns: 1fr 1fr;
            }
            .symbolism-full {
                grid-column: 1 / -1;
            }
        }

        .attribute {
            position: relative;
        }

        .attr-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .attr-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-color) 0%, transparent 100%);
            margin-left: 12px;
        }

        .attr-text {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.7;
        }

    </style>

        const navContainer = document.getElementById('nav-container');
        const galleryTarget = document.getElementById('gallery-target');
        
        let allImages = [];
        let currentlyActiveId = null;

        // Initialize Application
        function init() {
            buildNavigation();
            
            // Collect flat list of all images for easy lookup
            galleryData.forEach(act => {
                act.images.forEach(img => {
                    allImages.push(img);
                });
            });

            // Load first image by default if exists
            if (allImages.length > 0) {
                loadImage(allImages[0].id);
            }
        }

        function buildNavigation() {
            galleryData.forEach((act, actIndex) => {
                // Create Act Group
                const groupDiv = document.createElement('div');
                groupDiv.className = 'act-group';
                
                // Act Title
                const titleDiv = document.createElement('div');
                titleDiv.className = 'act-title';
                titleDiv.textContent = act.title;
                groupDiv.appendChild(titleDiv);
                
                // Images in Act
                act.images.forEach(img => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'nav-item';
                    itemDiv.id = `nav-${img.id}`;
                    
                    itemDiv.innerHTML = `
                        <span class="nav-num">${img.num}</span>
                        <span class="nav-name">${img.title}</span>
                    `;
                    
                    itemDiv.addEventListener('click', () => loadImage(img.id));
                    groupDiv.appendChild(itemDiv);
                });
                
                navContainer.appendChild(groupDiv);
            });
        }

        function loadImage(imageId) {
            const imgData = allImages.find(i => i.id === imageId);
            if (!imgData) return;
            
            // Update Navigation State
            if (currentlyActiveId) {
                const prevActive = document.getElementById(`nav-${currentlyActiveId}`);
                if (prevActive) prevActive.classList.remove('active');
            }
            
            const newActive = document.getElementById(`nav-${imageId}`);
            if (newActive) newActive.classList.add('active');
            currentlyActiveId = imageId;
            
            // Find parent Act for metadata
            const parentAct = galleryData.find(act => act.images.some(i => i.id === imageId));
            
            // Animate out
            galleryTarget.classList.remove('visible');
            
            // Wait for fade out, then render new content and fade in
            setTimeout(() => {
                renderDisplay(imgData, parentAct ? parentAct.title : "Conceptual Brief");
                
                // Trigger reflow to ensure CSS animation restarts
                void galleryTarget.offsetWidth;
                
                galleryTarget.classList.add('visible');
            }, 300); // Wait half of the transition duration for smoother crossfade
        }

        function renderDisplay(data, actTitle) {
            galleryTarget.innerHTML = `
                <div class="image-container">
                    <div class="image-placeholder">
                        <img src="${data.src}" alt="${data.title}" class="main-image" loading="lazy">
                    </div>
                </div>
                
                <div class="brief-container">
                    <div class="brief-header">
                        <div class="brief-meta">${actTitle} • IMAGE ${data.num}</div>
                        <h2 class="brief-title">${data.title}</h2>
                    </div>
                    
                    <div class="brief-grid">
                        <div class="attribute symbolism-full">
                            <div class="attr-label">Symbolism & Narrative Purpose</div>
                            <div class="attr-text">${data.symbolism}</div>
                        </div>
                        
                        <div class="attribute">
                            <div class="attr-label">Perspective</div>
                            <div class="attr-text">${data.perspective}</div>
                        </div>
                        
                        <div class="attribute">
                            <div class="attr-label">Mood & Atmosphere</div>
                            <div class="attr-text">${data.mood}</div>
                        </div>
                        
                        <div class="attribute">
                            <div class="attr-label">Depth & Focus</div>
                            <div class="attr-text">${data.depth}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Start
        document.addEventListener('DOMContentLoaded', init);

    </script>
